  "app.llm.openai_client.OpenAIWorkoutPlanClient for the actual model request.",
  "app.schemas.UserProfile and WorkoutPlan for typed inputs and outputs.",
]
used_by = [
  "app.main stores one generator instance on app.state.",
  "app.api.routes_generate calls this service for each workout generation request.",
]
