why_it_exists = "A small service layer keeps route code simple and gives the repo one explicit seam between HTTP handling, retrieval grounding, and LLM integration."
when_it_runs = "When the workout generation route calls WorkoutPlanGenerator.generate()."
dependencies = [
  "app.rag.retriever.build_retrieval_query and KnowledgeRetriever for retrieval grounding.",
