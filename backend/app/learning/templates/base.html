<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FitCoach AI Learn{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f8fafc;
        --surface: #ffffff;
        --surface-muted: #e2e8f0;
        --text: #1e293b;
        --muted: #475569;
        --primary: #2563eb;
        --accent: #f97316;
        --border: #cbd5e1;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        --radius: 18px;
        --content-width: 1080px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 35%),
          linear-gradient(180deg, #f8fafc 0%, #eef4ff 100%);
        color: var(--text);
        line-height: 1.6;
      }

      a {
        color: var(--primary);
      }

      a:focus-visible,
      button:focus-visible {
        outline: 3px solid rgba(37, 99, 235, 0.35);
        outline-offset: 3px;
      }

      .shell {
        width: min(calc(100% - 32px), var(--content-width));
        margin: 0 auto;
        padding: 24px 0 64px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        padding: 18px 20px;
        border: 1px solid rgba(203, 213, 225, 0.9);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(10px);
        box-shadow: var(--shadow);
      }

      .topbar-title {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .topbar-copy {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .topnav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topnav a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        text-decoration: none;
        color: var(--text);
        transition: background-color 180ms ease, border-color 180ms ease;
      }

      .topnav a:hover {
        background: #eff6ff;
        border-color: #93c5fd;
      }

      .cta-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid #93c5fd;
        background: #eff6ff;
        color: var(--primary);
        font-weight: 600;
        text-decoration: none;
        transition: background-color 180ms ease, border-color 180ms ease;
      }

      .cta-link:hover {
        background: #dbeafe;
        border-color: #60a5fa;
      }

      .card-actions {
        margin-top: 16px;
      }

      main {
        margin-top: 24px;
      }

      .hero,
      .panel,
      .detail-grid > section,
      .timeline-step {
        border: 1px solid rgba(203, 213, 225, 0.9);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.1);
        color: var(--primary);
        font-size: 0.9rem;
        font-weight: 600;
      }

      h1, h2, h3 {
        line-height: 1.15;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.25rem);
      }

      h2 {
        margin: 0 0 14px;
        font-size: 1.4rem;
      }

      h3 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      p, li {
        font-size: 1rem;
      }

      .lede {
        max-width: 70ch;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .stats,
      .card-grid,
      .detail-grid {
        display: grid;
        gap: 16px;
      }

      .stats {
        margin-top: 22px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .stat {
        padding: 16px;
        border-radius: 16px;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
      }

      .stat strong {
        display: block;
        font-size: 1.8rem;
      }

      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        margin: 28px 0 14px;
      }

      .section-head p {
        margin: 0;
        color: var(--muted);
      }

      .card-grid {
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .panel {
        padding: 22px;
      }

      .panel p:last-child,
      .panel ul:last-child {
        margin-bottom: 0;
      }

      .meta-list,
      .bullet-list,
      .timeline {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .meta-list li,
      .bullet-list li {
        padding: 10px 0;
        border-top: 1px solid #e2e8f0;
      }

      .meta-list li:first-child,
      .bullet-list li:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .detail-grid {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        align-items: start;
      }

      .detail-grid > section {
        padding: 22px;
      }

      .kicker {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.85rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 0;
        list-style: none;
      }

      .tag-list a,
      .tag-list span {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #bfdbfe;
        background: #eff6ff;
        color: var(--text);
        text-decoration: none;
      }

      .timeline {
        display: grid;
        gap: 16px;
      }

      .timeline-step {
        padding: 20px;
      }

      .timeline-step strong {
        color: var(--accent);
      }

      code {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 0.95em;
      }

      .empty-note {
        color: var(--muted);
        font-style: italic;
      }

      @media (max-width: 768px) {
        .shell {
          width: min(calc(100% - 24px), var(--content-width));
          padding-top: 16px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .hero,
        .panel,
        .detail-grid > section,
        .timeline-step {
          padding: 18px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="topbar-title">FitCoach AI Learn</p>
          <p class="topbar-copy">
            Internal notes for learning the backend without leaving the app.
          </p>
        </div>
        <nav class="topnav" aria-label="Learning portal">
          <a href="/__learn">Overview</a>
          <a href="/__learn/flows/request-lifecycle">Request flow</a>
          <a href="/__learn/glossary">Glossary</a>
        </nav>
      </header>
      <main id="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
