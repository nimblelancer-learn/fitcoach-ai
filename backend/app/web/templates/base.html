<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}FitCoach AI{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8fc;
        --surface: rgba(255, 255, 255, 0.94);
        --surface-strong: #ffffff;
        --text: #172033;
        --muted: #52607a;
        --primary: #0f6cbd;
        --primary-strong: #0a4d88;
        --accent: #f97316;
        --border: #d6deeb;
        --danger: #b42318;
        --danger-bg: #fef3f2;
        --success: #027a48;
        --success-bg: #ecfdf3;
        --shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        --radius: 20px;
        --content-width: 1180px;
      }

      * { box-sizing: border-box; }

      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(15, 108, 189, 0.14), transparent 32%),
          radial-gradient(circle at top right, rgba(249, 115, 22, 0.08), transparent 25%),
          linear-gradient(180deg, #f6f8fc 0%, #eef4ff 100%);
        color: var(--text);
        line-height: 1.6;
      }

      a { color: var(--primary); }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible,
      textarea:focus-visible {
        outline: 3px solid rgba(15, 108, 189, 0.28);
        outline-offset: 3px;
      }

      .shell {
        width: min(calc(100% - 32px), var(--content-width));
        margin: 0 auto;
        padding: 24px 0 56px;
      }

      .topbar,
      .hero,
      .panel,
      .result-card,
      .status-card,
      .workout-day {
        border: 1px solid rgba(214, 222, 235, 0.95);
        border-radius: var(--radius);
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        padding: 18px 20px;
        backdrop-filter: blur(8px);
      }

      .brand {
        margin: 0;
        font-size: 1rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .brand-copy {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .topnav {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .topnav a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
        text-decoration: none;
        color: var(--text);
      }

      .topnav a:hover {
        background: #eaf3ff;
        border-color: #b3d6fb;
      }

      main { margin-top: 24px; }

      .hero { padding: 30px; }

      .eyebrow {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 108, 189, 0.1);
        color: var(--primary);
        font-size: 0.9rem;
        font-weight: 600;
      }

      h1, h2, h3 { line-height: 1.15; }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2.1rem, 4vw, 3.5rem);
      }

      h2 {
        margin: 0 0 14px;
        font-size: 1.45rem;
      }

      h3 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      p, li, label, input, select, textarea, button {
        font-size: 1rem;
      }

      .lede {
        max-width: 72ch;
        color: var(--muted);
        font-size: 1.05rem;
      }

      .hero-grid,
      .main-grid,
      .summary-grid,
      .stats-grid,
      .day-grid {
        display: grid;
        gap: 18px;
      }

      .hero-grid {
        margin-top: 22px;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .status-card,
      .result-card,
      .workout-day {
        padding: 20px;
      }

      .kicker {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .status-card strong {
        display: block;
        margin-bottom: 6px;
        font-size: 1.25rem;
      }

      .main-grid {
        margin-top: 24px;
        grid-template-columns: minmax(0, 420px) minmax(0, 1fr);
        align-items: start;
      }

      .panel {
        padding: 24px;
      }

      .section-copy {
        margin: 0 0 18px;
        color: var(--muted);
      }

      .field-group {
        display: grid;
        gap: 8px;
        margin-bottom: 18px;
      }

      .field-group:last-child {
        margin-bottom: 0;
      }

      .field-grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .choice-grid {
        display: grid;
        gap: 10px;
      }

      .choice-grid.compact {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      }

      .choice-card {
        position: relative;
      }

      .choice-card input {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .choice-card label {
        display: flex;
        align-items: center;
        min-height: 48px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface-strong);
        cursor: pointer;
      }

      .choice-card input:checked + label {
        border-color: #8ec5f8;
        background: #edf6ff;
        color: var(--primary-strong);
        font-weight: 600;
      }

      input[type="number"],
      select,
      textarea {
        width: 100%;
        min-height: 48px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: #ffffff;
        color: var(--text);
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .helper {
        margin: 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .button-row {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .primary-button,
      .secondary-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .primary-button {
        border: 0;
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-strong) 100%);
        color: #ffffff;
        cursor: pointer;
      }

      .primary-button[disabled] {
        opacity: 0.72;
        cursor: progress;
      }

      .secondary-link {
        border: 1px solid var(--border);
        background: #ffffff;
        color: var(--text);
      }

      .notice-list,
      .detail-list,
      .warning-list {
        margin: 0;
        padding-left: 20px;
      }

      .summary-grid {
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .summary-chip {
        padding: 16px;
        border-radius: 16px;
        background: #eef6ff;
        border: 1px solid #c8e1fb;
      }

      .summary-chip strong {
        display: block;
        font-size: 1.35rem;
      }

      .alert {
        margin-bottom: 18px;
        padding: 16px 18px;
        border-radius: 16px;
        border: 1px solid transparent;
      }

      .alert-error {
        border-color: #f5c2c7;
        background: var(--danger-bg);
        color: #7a271a;
      }

      .alert-success {
        border-color: #a6f4c5;
        background: var(--success-bg);
        color: #065f46;
      }

      .meta-pill-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .meta-pill-list li {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #cfe3f6;
        background: #f4f9ff;
      }

      .meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 38px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid #cfe3f6;
        background: #f4f9ff;
      }

      .meta-pill-alert {
        border-color: #fec84b;
        background: #fffaeb;
        color: #93370d;
      }

      .review-list {
        display: grid;
        gap: 18px;
      }

      .review-card {
        padding: 20px;
        border-radius: 20px;
        border: 1px solid var(--border);
        background: #fbfdff;
      }

      .review-header,
      .review-grid {
        display: grid;
        gap: 16px;
      }

      .review-header {
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: start;
        margin-bottom: 18px;
      }

      .review-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 16px;
      }

      .review-stats {
        margin-top: 16px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .day-grid {
        margin-top: 18px;
      }

      .day-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin: 12px 0 16px;
      }

      .day-meta span {
        display: inline-flex;
        align-items: center;
        min-height: 34px;
        padding: 0 10px;
        border-radius: 999px;
        background: #f4f8fc;
        border: 1px solid var(--border);
        color: var(--muted);
      }

      .exercise-list {
        display: grid;
        gap: 14px;
      }

      .exercise-card {
        padding: 16px;
        border-radius: 16px;
        background: #fbfdff;
        border: 1px solid #dbe7f3;
      }

      .empty-state {
        color: var(--muted);
        font-style: italic;
      }

      code {
        font-family: "IBM Plex Mono", "SFMono-Regular", monospace;
        font-size: 0.95em;
      }

      @media (max-width: 900px) {
        .main-grid { grid-template-columns: 1fr; }
      }

      @media (max-width: 768px) {
        .shell {
          width: min(calc(100% - 24px), var(--content-width));
          padding-top: 16px;
        }

        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .hero,
        .panel,
        .result-card,
        .status-card,
        .workout-day {
          padding: 18px;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }

        .review-header,
        .review-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="brand">FitCoach AI</p>
          <p class="brand-copy">
            Public MVP for grounded, structured beginner workout planning.
          </p>
        </div>
        <nav class="topnav" aria-label="Primary">
          <a href="/">Demo</a>
          <a href="/health">API health</a>
          <a href="/docs">API docs</a>
        </nav>
      </header>
      <main id="main-content">
        {% block content %}{% endblock %}
      </main>
    </div>
    <script>
      document.addEventListener("submit", (event) => {
        const form = event.target;
        if (!(form instanceof HTMLFormElement)) return;
        const button = form.querySelector("[data-submit-button]");
        if (!(button instanceof HTMLButtonElement)) return;
        button.disabled = true;
        button.dataset.originalText = button.textContent || "";
        button.textContent = "Generating plan...";
      });
    </script>
  </body>
</html>
